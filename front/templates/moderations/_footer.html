<div>
    <form method="post">
        {% csrf_token %}
        <div class="mt-3">
            <label for="comment" style="display: none"></label>
            <textarea name="comment" id="comment" rows="2" class="form-control" placeholder="Add a comment...">{% if moderation.comment %}{{ moderation.comment }}{% endif %}</textarea>
        </div>
        <div class="mt-2">
            <label for="change_status" class="form-label">Status</label>
            <select name="change_status" id="change_status" class="form-select" style="width: auto; display: inline-block; padding-right: 2rem;">
                <option value="{{ moderation_statuses.TO_VALIDATE }}" {% if moderation.status == 'to_validate' %}selected{% endif %}>To validate</option>
                <option value="{{ moderation_statuses.VALIDATED }}" {% if moderation.status == 'validated' %}selected{% endif %}>Validated</option>
                <option value="{{ moderation_statuses.BUG }}" {% if moderation.status == 'bug' %}selected{% endif %}>Bug</option>
            </select>
        </div>
        <div class="mt-1 mb-3">
            <button type="submit" class="btn btn-secondary mt-1">Save</button>
        </div>
    </form>
</div>
<div>
    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="delete_moderation" />
        <button type="submit" class="btn btn-gray-700">
             <i class="fas fa-xmark"></i>
            Delete moderation
        </button>
    </form>
</div>
