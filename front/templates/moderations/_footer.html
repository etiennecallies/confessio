<div>
    <form method="post">
        {% csrf_token %}
        <div class="mt-3">
            <label for="comment" style="display: none"></label>
        <textarea name="comment" id="comment" rows="2" class="form-control" placeholder="Add a comment...">{% if moderation.comment %}{{ moderation.comment }}{% endif %}</textarea>
        </div>
        <div class="mt-1 mb-3">
            <button type="submit" class="btn btn-secondary mt-1">Save comment</button>
        </div>
    </form>
</div>
{% if moderation.status != 'bug' %}
    <div>
        <form method="post">
            <label>
                <input type="text" name="bug_description" maxlength="{{ bug_description_max_length }}">
            </label>
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Report bug & {% if back_path %}back{% else %}next{% endif %}</button>
        </form>
    </div>
{% endif %}
<div>
    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="delete_moderation" />
        <button type="submit" class="btn btn-gray-700">
             <i class="fas fa-xmark"></i>
            Delete moderation
        </button>
    </form>
</div>
